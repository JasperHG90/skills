name: checks
description: "Run skill formatting checks on changed skills."

inputs:
    python_version:
        description: "Python version to use."
        required: false
        default: "3.12"
    uv_version:
        description: "uv version to use."
        required: false
        default: '0.9.x'
    skill_dirs:
        description: "List of skill directories to check."
        required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: ${{ inputs.uv_version }}
        enable-cache: true
        cache-dependency-glob: "${{ github.action_path }}/requirements.txt"
    - name: Install dependencies
      run: uv pip install --system -r ${{ github.action_path }}/requirements.txt
      shell: bash
    - name: Run skill formatting checks
      run: python ${{ github.action_path }}/script.py ${{ inputs.skill_dirs }}
      shell: bash
